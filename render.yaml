services:
  - type: web
    name: ar-agent-demo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 python server.py
    envVars:
      - key: SEED_DEMO_DATA
        value: "1"
      - key: LLM_PROVIDER
        value: kimi
      - key: KIMI_MODEL
        value: kimi-k2.6
      - key: KIMI_BASE_URL
        value: https://api.moonshot.ai/v1
      - key: SENDER_EMAIL
        value: finance@example.com
